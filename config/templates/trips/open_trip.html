{% load static %}
<link rel="stylesheet" href="{% static 'css/forms.css' %}">

<div class="page-center">
    <div class="form-card">
        <a href="/driver-dashboard/">⬅ Back </a><h2>🚚 Open Trip</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Vehicle</label>
                <input type="text" value="{{ vehicle.vehicle_number }}" disabled>
            </div>

            <div class="form-group">
                <label>Start Location</label>
                <input type="text" name="start_location" required>
            </div>

            <div class="form-group">
                <label>Start Meter Reading</label>
                <input type="number" name="start_meter_reading" required>
            </div>

            <div class="form-group">
                <label>Start Meter Photo</label>
                <input type="file" name="start_meter_image" required>
            </div>

            <button type="submit" class="btn-primary">
                Open Trip
            </button>
        </form>
    </div>
</div>
