{% if messages %}
  {% for message in messages %}
    <p style="color: green;">{{ message }}</p>
  {% endfor %}
{% endif %}  

<style>
/* ===== DRIVER DASHBOARD UI ===== */

body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 15px;
}

/* Page title */
.driver-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
}

/* Top bar */
.driver-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1f2d3d;
    padding: 12px 16px;
    border-radius: 10px;
    color: white;
    margin-bottom: 18px;
}

.driver-top a {
    color: white;
    text-decoration: none;
    font-size: 14px;
    margin-left: 12px;
}

/* Menu grid */
.driver-menu {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
}

/* Card buttons */
.driver-card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: #1f2d3d;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.driver-card:hover {
    transform: scale(1.02);
}

/* Icon size */
.driver-card span {
    font-size: 26px;
}

/* Mobile + tablet */
@media (min-width: 600px) {
    .driver-menu {
        grid-template-columns: 1fr 1fr;
    }
}
</style>

<div class="driver-title">🚚 Driver Dashboard</div>

<div class="driver-top">
    <div>Welcome, {{ request.user.username }}</div>
    <div>
        <a href="{% url 'driver_profile' %}">👤 Profile</a><br><br>
        <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit">🚪 Logout</button>
        </form>
    </div>
</div>

<div class="driver-menu">

    <a href="{% url 'trips:open_trip' %}" class="driver-card">
        <span>🚚</span> Open Trip
    </a>

    <a href="{% url 'trips:close_trip' %}" class="driver-card">
        <span>⛔</span> Close Trip
    </a>

    <a href="{% url 'add-fuel' %}" class="driver-card">
        <span>⛽</span> Add Fuel
    </a>


    <a href="{% url 'parking-entry' %}" class="driver-card">
        <span>🅿️</span> Parking Entry
    </a>

    <a href="{% url 'trips:driver_trip_summary' request.user.id %}" class="driver-card">
        <span>📋</span> My Trip Summary
    </a>


</div>
